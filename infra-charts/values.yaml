nameOverride: ""
fullnameOverride: ""

redis:
  enabled: true
  nameOverride: redis
  image:
    repository: docker.io/library/redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

rabbitmq:
  enabled: true
  nameOverride: rabbitmq
  image:
    repository: docker.io/library/rabbitmq
    tag: "3.13-management-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: cba
    existingSecret: rabbitmq-auth
    passwordKey: password
  service:
    type: ClusterIP
    amqpPort: 5672
    managementPort: 15672
  persistence:
    enabled: false
    size: 2Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
