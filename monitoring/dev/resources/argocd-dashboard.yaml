apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argocd
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  argocd-overview.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []},
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"expr": "count(argocd_app_info{health_status!~\"Healthy|Progressing\"})", "refId": "A"}],
          "title": "Unhealthy applications",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []},
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"expr": "count(argocd_app_info{sync_status!=\"Synced\"})", "refId": "A"}],
          "title": "Out-of-sync applications",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"expr": "count(argocd_app_info)", "refId": "A"}],
          "title": "Applications",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(argocd_app_reconcile_bucket[5m])) by (le))", "refId": "A"}],
          "title": "Reconcile p95",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 6},
          "id": 5,
          "options": {"cellHeight": "sm", "showHeader": true},
          "targets": [{"expr": "argocd_app_info", "format": "table", "instant": true, "refId": "A"}],
          "title": "Argo CD application status",
          "transformations": [{"id": "labelsToFields", "options": {}}, {"id": "organize", "options": {"excludeByName": {"Time": true, "Value": true, "__name__": true, "instance": true, "job": true}, "indexByName": {}, "renameByName": {"dest_namespace": "Destination", "health_status": "Health", "name": "Application", "project": "Project", "sync_status": "Sync"}}}],
          "type": "table"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "tags": ["argocd", "cba"],
      "templating": {"list": [{"current": {"text": "Prometheus", "value": "Prometheus"}, "hide": 2, "label": "Datasource", "name": "datasource", "query": "prometheus", "type": "datasource"}]},
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "browser",
      "title": "Argo CD Overview",
      "uid": "cba-argocd-overview",
      "version": 1
    }
