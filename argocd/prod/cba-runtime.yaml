apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cba-runtime-infra-prod
  namespace: argocd
spec:
  project: cba-connect-prod
  source:
    repoURL: https://github.com/dpcomm/cba_infra.git
    targetRevision: main
    path: charts/cba-runtime
    helm:
      releaseName: cba-runtime-infra
      valueFiles:
        - values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cba-connect-prod
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 10
