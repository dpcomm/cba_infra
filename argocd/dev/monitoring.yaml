apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dev
  namespace: argocd
spec:
  project: cba-connect-dev
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.15.1
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/monitoring/dev/kube-prometheus-stack.values.yaml
    - repoURL: https://github.com/dpcomm/cba_infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
  revisionHistoryLimit: 5
