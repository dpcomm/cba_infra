apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cba-management-dev
  namespace: argocd
spec:
  project: cba-connect-dev
  source:
    repoURL: https://github.com/dpcomm/cba_infra.git
    targetRevision: main
    path: charts/cba-app
    helm:
      releaseName: cba-management
      valueFiles:
        - values/dev/cba-management.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cba-connect-dev
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 10
