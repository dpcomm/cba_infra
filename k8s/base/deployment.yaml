apiVersion: apps/v1
kind: Deployment
metadata:
  name: cba-was-renew
  labels:
    app: cba-was-renew
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cba-was-renew
  template:
    metadata:
      labels:
        app: cba-was-renew
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: cba-was-renew
          image: ap-chuncheon-1.ocir.io/axdhp42jvukm/cba_was_renew:latest_dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: cba-was-renew-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
